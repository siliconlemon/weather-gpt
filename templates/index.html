<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="title">Počasí — chat</title>
  <meta
    name="description"
    content="Weather GPT: chat o počasí, předpovědi a kvalitě vzduchu. Zeptejte se přirozeným jazykem na východ slunce, déšť, UV index a další."
  />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0c0e12" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#eef1f7" media="(prefers-color-scheme: light)" />
  <link rel="canonical" href="{{ site_url }}{{ request.path }}" />
  <link rel="alternate" hreflang="cs" href="{{ site_url }}{{ request.path }}" />
  <link rel="alternate" hreflang="en" href="{{ site_url }}{{ request.path }}" />
  <link rel="alternate" hreflang="x-default" href="{{ site_url }}{{ request.path }}" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Weather GPT" />
  <meta property="og:locale" content="cs_CZ" />
  <meta property="og:locale:alternate" content="en_US" />
  <meta property="og:url" content="{{ site_url }}{{ request.path }}" />
  <meta property="og:title" content="Weather GPT | Zeptejte se na počasí, předpověď nebo kvalitu vzduchu" />
  <meta
    property="og:description"
    content="Weather GPT: chat o počasí, předpovědi a kvalitě vzduchu. Zeptejte se přirozeným jazykem na východ slunce, déšť, UV index a další."
  />
  <meta property="og:image" content="{{ site_url }}{{ url_for('static', filename='images/thumbnail.png') }}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Weather GPT | Zeptejte se na počasí, předpověď nebo kvalitu vzduchu" />
  <meta
    name="twitter:description"
    content="Weather GPT: chat o počasí, předpovědi a kvalitě vzduchu. Zeptejte se přirozeným jazykem na východ slunce, déšť, UV index a další."
  />
  <meta name="twitter:image" content="{{ site_url }}{{ url_for('static', filename='images/thumbnail.png') }}" />
  <script type="application/ld+json">
    {{ {"@context": "https://schema.org", "@type": "WebSite", "name": "Weather GPT", "url": site_url ~ "/", "description": "Konverzační rozhraní pro počasí, předpověď a kvalitu vzduchu."} | tojson }}
  </script>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}" />
  <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" sizes="any" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/favicon.png') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/fonts.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme-toggle.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/nav.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/locale.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme-light.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}" />
  <script>
    (function () {
      try {
        if (localStorage.getItem("weather-gpt-theme") === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      } catch (_) {}
    })();
  </script>
  <style>
    .app-body--bg {
      --bg-image: url({{ url_for('static', filename='images/site-bg.jpg') | tojson }});
    }
  </style>
</head>
<body class="app-body app-body--bg">
  <a class="skip-link" href="#main-content" data-i18n="skipToContent">Přeskočit na obsah</a>
  <div class="backdrop"></div>
  <main id="main-content" class="shell" tabindex="-1">
    <header class="top">
      <div class="brand">
        <span class="logo-wrap" aria-hidden="true">
          <img
            class="logo"
            src="{{ url_for('static', filename='images/favicon.svg') }}"
            width="32"
            height="32"
            alt=""
          />
        </span>
        <div>
          <h1 class="title" data-i18n="heading">Počasí</h1>
          <p class="tagline tagline--full" data-i18n="tagline">Zeptejte se na počasí, předpověď nebo kvalitu vzduchu.</p>
          <p class="tagline tagline--short" data-i18n="taglineShort">Zeptejte se na počasí</p>
        </div>
      </div>
      <div class="top-actions">
        <button
          type="button"
          id="nav-menu-toggle"
          class="nav-menu-toggle"
          aria-expanded="false"
          aria-controls="nav-menu-drawer"
          data-i18n-aria-label="menuOpen"
        >
          <span class="nav-menu-toggle__icon" aria-hidden="true"><i data-lucide="menu"></i></span>
        </button>
        <div id="nav-menu-drawer" class="nav-menu-drawer" hidden>
          <button type="button" class="nav-menu-drawer__backdrop" data-i18n-aria-label="menuCloseBackdrop"></button>
          <nav class="nav-menu-drawer__panel" role="dialog" aria-modal="true" aria-labelledby="nav-menu-title">
            <div class="nav-menu-drawer__head">
              <h2 id="nav-menu-title" class="nav-menu-drawer__title" data-i18n="menuTitle">Nastavení</h2>
              <button type="button" id="nav-menu-close" class="nav-menu-close" data-i18n-aria-label="menuClose">
                <span class="nav-menu-close__icon" aria-hidden="true"><i data-lucide="x"></i></span>
              </button>
            </div>
            <div class="nav-menu-drawer__body">
              <section class="nav-menu-section" aria-labelledby="nav-lang-heading">
                <h3 id="nav-lang-heading" class="nav-menu-section__label" data-i18n="language">Jazyk</h3>
                <div class="nav-locale-row" role="group" aria-labelledby="nav-lang-heading">
                  <button type="button" class="nav-locale-btn" data-locale="cs">Čeština</button>
                  <button type="button" class="nav-locale-btn" data-locale="en">English</button>
                </div>
              </section>
              <section class="nav-menu-section" aria-labelledby="nav-theme-heading">
                <h3 id="nav-theme-heading" class="nav-menu-section__label" data-i18n="appearance">Vzhled</h3>
                <button type="button" class="theme-toggle theme-toggle--nav" data-theme-toggle aria-pressed="false">
                  <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true"><i data-lucide="sun"></i></span>
                  <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true"><i data-lucide="moon"></i></span>
                  <span class="theme-toggle--nav__text" data-theme-toggle-label></span>
                </button>
              </section>
            </div>
          </nav>
        </div>
        <div class="toolbar toolbar--desktop">
          <div class="locale">
            <span class="locale__icon" aria-hidden="true"><i data-lucide="languages"></i></span>
            <div class="locale-dropdown">
              <button
                type="button"
                id="locale-trigger"
                class="locale-trigger"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-controls="locale-menu"
                data-i18n-aria-label="language"
                data-i18n-title="language"
              >
                <span id="locale-current" class="locale-trigger__label">Čeština</span>
                <span class="locale-trigger__caret" aria-hidden="true"><i data-lucide="chevron-down"></i></span>
              </button>
              <ul id="locale-menu" class="locale-menu" role="listbox" hidden>
                <li class="locale-menu__item" role="option" data-value="cs" tabindex="-1">Čeština</li>
                <li class="locale-menu__item" role="option" data-value="en" tabindex="-1">English</li>
              </ul>
            </div>
          </div>
          <button type="button" id="theme-toggle" class="theme-toggle" data-theme-toggle aria-pressed="false">
            <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true"><i data-lucide="sun"></i></span>
            <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true"><i data-lucide="moon"></i></span>
          </button>
        </div>
      </div>
    </header>
    <section
      class="chat"
      data-i18n-aria-label="chatRegion"
      aria-label="Konverzace — chat o počasí"
    >
      <div class="chat__viewport">
        <button
          type="button"
          id="chat-clear"
          class="chat-clear"
          hidden
          data-i18n-aria-label="clearChat"
          data-i18n-title="clearChat"
          aria-label="Clear conversation"
          title="Clear conversation"
        >
          <i data-lucide="rotate-ccw" aria-hidden="true"></i>
        </button>
        <div id="messages" class="messages" role="log" aria-live="polite"></div>
      </div>
      <div
        id="suggestions"
        class="suggestions"
        role="group"
        data-i18n-aria-label="suggestionsGroup"
        aria-label="Example questions"
        hidden
      ></div>
      <form id="composer" class="composer" autocomplete="off" novalidate>
        <label for="input" class="visually-hidden" data-i18n="composerLabel">Zpráva pro asistenta</label>
        <textarea
          id="input"
          rows="1"
          data-i18n-placeholder="placeholder"
          placeholder="Napiš zprávu…"
          autocomplete="off"
          enterkeyhint="send"
        ></textarea>
        <button type="submit" id="send" class="send" data-i18n-aria-label="send">
          <i data-lucide="send" aria-hidden="true"></i>
        </button>
      </form>
    </section>
  </main>
  <!-- Blocking: marked → purify → markdown helpers, then deferred app. -->
  <script src="{{ url_for('static', filename='vendor/marked.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/purify.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/markdown.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/lucide.min.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/theme.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/locale.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/chat.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</body>
</html>
